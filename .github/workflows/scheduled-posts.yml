# Zamanlanmis reels yayinlayicisini duzenli tetikler.
# Vercel Hobby plan cron'u gunde 1 calistigi icin GitHub Actions kullanildi.
# Not: GitHub cron'lari yogunlukta 5-15 dk gecikebilir; endpoint "zamani
# gelmisleri isle" mantiginda oldugu icin gecikme yalnizca yayini geciktirir.
name: scheduled-posts-trigger

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Zamanlanmis paylasimlari tetikle
        run: |
          curl -sS --max-time 55 "https://project-80xl4-kopmaz2010s-projects.vercel.app/api/cron/scheduled-posts" || true
